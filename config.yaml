# ============================================================
# CS2 ANALYST BOT - Configuracao
# ============================================================

# Telegram
telegram:
  enabled: true
  bot_token: "8340705505:AAEAyTertkpSQMqFATWwG4vzY_DEKQ5QCS8"
  chat_id: "5496924490"

# Scraper
scraper:
  # Delay entre requests ao HLTV (respeitar rate limit)
  min_delay: 4.0
  max_delay: 10.0
  # Proxy (opcional - recomendado se for scrape pesado)
  proxy_path: ""  # ex: "proxies.txt"
  # Quantos meses de historico buscar no backfill inicial
  backfill_months: 6
  # Estrategia de provider para partidas futuras
  upcoming_provider: "pandascore"
  upcoming_fallback: "hltv"
  upcoming_days_ahead: 7
  upcoming_max_pages: 5
  upcoming_retry_count: 3
  upcoming_retry_backoff_sec: 2
  # PandaScore
  pandascore_base_url: "https://api.pandascore.co"
  pandascore_token_env: "PANDASCORE_API_TOKEN"
  # Historico para treino (agressivo, com controle de cota)
  pandascore_history_enabled: true
  pandascore_history_months: 12
  pandascore_history_window_days: 7
  pandascore_history_per_page: 100
  pandascore_history_max_requests_per_hour: 800
  pandascore_history_sync_interval_minutes: 30
  pandascore_history_checkpoint_key: "pandascore_history_cursor"

# Banco de dados
database:
  path: "data/cs2_analyst.db"

# Odds feed (real-time)
odds:
  enabled: true
  provider: "oddspapi"
  base_url: "https://api.oddspapi.io/v4"
  token_env: "ODDSPAPI_API_KEY"
  sport_id: ""
  market: "h2h"
  refresh_minutes: 10
  match_window_hours: 6
  # false = sincroniza odds apenas no inicio de cada ciclo principal
  sync_during_wait: false
  timeout_sec: 15
  retry_count: 3
  retry_backoff_sec: 2
  max_pick_odds_age_minutes: 120
  bookmaker_whitelist: ["bet365", "betano", "pinnacle", "1xbet"]

# Modelo
model:
  # Caminho onde salvar/carregar o modelo treinado
  path: "data/model.joblib"
  # Minimo de partidas do time pra considerar nas features
  min_matches: 0
  # Minimo de jogos recentes por time na inferencia ao vivo
  live_min_recent_matches: 5
  # Minimo de jogos recentes por time no treino
  train_min_recent_matches: 0
  # Filtros conservadores de qualidade
  exclude_synthetic_teams_live: true
  exclude_synthetic_teams_train: false
  exclude_academy_teams_live: true
  exclude_academy_teams_train: false
  # Pesos de qualidade para treino agressivo
  train_weight_synthetic: 0.8
  train_weight_academy: 0.7
  # Evita leakage de roster em treino sem historico temporal de jogadores
  use_player_features: false
  # Janela de forma recente (dias)
  form_window_days: 365
  # Calibracao e separacao de probabilidade
  enable_calibration: true
  calibration_method: "sigmoid"
  calibration_min_samples: 80
  calibration_cv_splits: 3
  # Robustez temporal
  holdout_days: 14
  recency_half_life_days: 120
  min_train_samples: 120
  min_class_samples: 30
  confidence_auto_tune: true
  confidence_grid: [60, 65, 70, 75, 80]
  coverage_min_holdout: 0.15
  prediction_temperature: 0.9
  low_data_rank_blend: 0.35
  rank_prior_scale: 12.0
  # Minimo de value (%) pra disparar alerta
  min_value_pct: 8.0
  # Confianca minima do modelo (%) pra considerar
  min_confidence: 70.0
  # Quantidade de melhores partidas para ranking por ciclo
  top_bets_count: 3
  # Ignora partidas que comecam em ate X minutos (ou que ja iniciaram)
  min_minutes_before_match: 5

# Gestao de banca
bankroll:
  total: 2000.0          # Banca total (R$)
  max_bet_pct: 3.0        # Maximo % da banca por aposta
  kelly_fraction: 0.25    # Fracao de Kelly (0.25 = quarter Kelly, conservador)

# Scheduler
scheduler:
  timezone: "America/Sao_Paulo"
  # Intervalo entre scans de partidas futuras (minutos)
  scan_interval: 60
  # Hora do scrape diario de stats (formato 24h)
  daily_update_hour: 6
  daily_top5_audit_enabled: true
  daily_audit_hour: 0
  daily_audit_minute: 30
  audit_match_window_hours: 6
  audit_pending_max_days: 3
